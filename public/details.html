<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Details | HSE Consulting</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .details-container {
            max-width: 1000px;
            margin: 3rem auto;
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .detail-row {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .description-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.5rem;
            border-radius: 6px;
            margin-top: 1rem;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">HSE<span>Consulting</span></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/profile">Back to Profile</a>
        </div>
    </nav>

    <div class="details-container">
        <h2 style="margin-bottom: 2rem;">Request Details</h2>

        <div id="details-content">
            <p>Loading...</p>
        </div>

        <div style="margin-top: 2rem;">
            <a href="/profile" class="btn btn-secondary">Back</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const content = document.getElementById('details-content');

            if (!id) {
                content.innerHTML = '<p style="color:red;">No ID provided</p>';
                return;
            }

            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Update back links if Admin
            if (user.role === 'Admin') {
                const backLinks = document.querySelectorAll('a[href="/profile"]');
                backLinks.forEach(link => {
                    link.href = '/admin';
                    if (link.innerText.includes('Profile')) {
                        link.innerText = 'Back to Admin Panel';
                    }
                });
            }

            try {
                // We'll search in the user's orders or admin's orders
                // For simplicity, we'll fetch all orders (if admin) or user's orders and find by ID
                let response;
                if (user.role === 'Admin') {
                    response = await fetch('/api/admin/orders', {
                        headers: { 'X-Username': user.username }
                    });
                } else {
                    response = await fetch('/api/orders', {
                        headers: { 'X-Username': user.username }
                    });
                }

                if (response.ok) {
                    const orders = await response.json();
                    const order = orders.find(o => o.id == id);
                    if (order) {
                        content.innerHTML = `
                            <div class="detail-row">
                                <span class="detail-label">Request ID</span>
                                <span class="detail-value">#${order.id}</span>
                            </div>
                            ${user.role === 'Admin' ? `
                            <div class="detail-row" style="background: rgba(59, 130, 246, 0.1); padding: 1rem; border-radius: 8px; margin-bottom: 2rem;">
                                <span class="detail-label" style="color: var(--accent);">Applicant Details (Admin only)</span>
                                <span class="detail-value" style="display:block; font-size: 1.1rem;">
                                    ${order.firstName || 'Unknown'} ${order.lastName || ''}<br>
                                    <small style="color: var(--text-muted);">${order.email || 'No email'}</small>
                                </span>
                            </div>
                            ` : ''}
                            <div class="detail-row">
                                <span class="detail-label">Status</span>
                                <span class="badge ${order.status.toLowerCase().replace(' ', '-')}">${order.status}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Created At (UTC)</span>
                                <span class="detail-value">${order.time || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Type / Service</span>
                                <span class="detail-value">${order.service || (order.type + ': ' + (order.category || 'General'))}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Description</span>
                                <div class="description-box">${order.description}</div>
                            </div>
                            ${order.response ? `
                            <div class="detail-row">
                                <span class="detail-label" style="color:#4ade80;">Admin Response</span>
                                <div class="description-box" style="border: 1px solid #4ade80;">${order.response}</div>
                            </div>
                            ` : ''}
                            ${order.budget ? `
                            <div class="detail-row">
                                <span class="detail-label">Budget</span>
                                <span class="detail-value">$${order.budget}</span>
                            </div>
                            ` : ''}
                        `;
                    } else {
                        content.innerHTML = '<p style="color:red;">Request not found or access denied</p>';
                    }
                } else {
                    content.innerHTML = '<p style="color:red;">Error fetching data</p>';
                }
            } catch (err) {
                console.error(err);
                content.innerHTML = '<p style="color:red;">Connection error</p>';
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order | HSE Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<nav class="navbar">
    <div class="logo"><a href="/" style="text-decoration:none; color:inherit;">HSE<span>Consulting</span></a></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login" id="nav-login">Login</a>
        <a href="/register" id="nav-register">Register</a>
        <a href="/profile" id="nav-profile" style="display:none;">Profile</a>
        <a href="/admin" id="nav-admin" style="display:none;">Admin</a>
        <a href="/orders" id="nav-orders" class="active" style="display:none;">New Order</a>
        <a href="/support">Support / FAQ</a>
        <a href="#" id="nav-logout" style="display:none;" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="services">
    <h2>New Order</h2>
    <p style="text-align: center; color: var(--text-muted);">Fill out the form below to start a new consulting
        session.</p>

    <div class="form-container" style="max-width: 800px;">
        <h3>Create New Order</h3>
        <form id="order-form" style="margin-top: 1.5rem; text-align: left;">
            <div class="form-group">
                <label>Project Description</label>
                <input type="text" name="description" required>
            </div>
            <div class="form-group">
                <label>Service Area (e.g. Audit, Code Review)</label>
                <input type="text" name="service" required>
            </div>
            <div class="form-group">
                <label>Estimated Budget ($)</label>
                <input type="number" name="budget" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit Request</button>
        </form>
    </div>
</div>

<script src="/js/app.js"></script>
</body>

</html>

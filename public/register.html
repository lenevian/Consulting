<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HSE Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="/" style="text-decoration:none; color:inherit;">HSE<span>Consulting</span></a>
        </div>
        <div class="nav-links">
            <a href="/profile" id="nav-profile" style="display:none;">Profile</a>
            <a href="/admin" id="nav-admin" style="display:none;">Admin</a>
            <a href="/orders" id="nav-orders" style="display:none;">New Order</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Create an Account</h2>
        <form id="register-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="firstName" required placeholder="Alex">
                </div>
                <div class="form-group">
                    <label>Surname</label>
                    <input type="text" name="lastName" required placeholder="Moroz">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="email@smth.com">
            </div>
            <div class="form-group">
                <label>Choose Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Choose Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
        </form>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>

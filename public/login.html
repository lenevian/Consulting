<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HSE Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="/" style="text-decoration:none; color:inherit;">HSE<span>Consulting</span></a>
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/profile" id="nav-profile" style="display:none;">Profile</a>
            <a href="/admin" id="nav-admin" style="display:none;">Admin</a>
            <a href="/orders" id="nav-orders" style="display:none;">New Order</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Welcome Back</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.9rem;">
            Don't have an account? <a href="/register" style="color:var(--accent)">Register here</a>
        </p>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
